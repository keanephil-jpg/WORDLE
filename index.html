<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wordle for Mum</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(180deg, #e7f7f3, #e3fff8);
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* FULLSCREEN FIREWORKS CANVAS */
  #fireworksCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 999;        /* ABOVE the game */
  pointer-events: none; /* DOES NOT block input */
  background: transparent;
}




    h1 {
      margin-top: 10px;
      letter-spacing: 0.15em;
      color: #444;
      z-index: 100;
    }

    #gameArea {
      flex: 1;
      overflow-y: auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 140px;
      position: relative;
      z-index: 100;
    }

    #board {
      margin-top: 10px;
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .tile {
      width: 70px;
      height: 70px;
      border: 2px solid #aaa;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      text-transform: uppercase;
      box-sizing: border-box;
      border-radius: 6px;
      color: #333;
    }

    .tile.correct { background: #6aaa64; border-color: #6aaa64; color: #fff; }
    .tile.present { background: #c9b458; border-color: #c9b458; color: #fff; }
    .tile.absent  { background: #787c7e; border-color: #787c7e; color: #fff; }

    #message {
      margin: 10px;
      min-height: 24px;
      font-size: 20px;
      text-align: center;
      color: #444;
      padding: 10px;
      border-radius: 8px;
    }

    #keyboard {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: linear-gradient(180deg, #e7f7f3, #e3fff8);
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.15);
      backdrop-filter: blur(6px);
      z-index: 100;
    }

    .key-row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .key {
      background: #d0d4d8;
      color: #333;
      padding: 14px 12px;
      border-radius: 6px;
      font-weight: bold;
      user-select: none;
      text-transform: uppercase;
      min-width: 40px;
      text-align: center;
      font-size: 16px;
      touch-action: manipulation;
    }

    .key.correct { background: #6aaa64; color: #fff; }
    .key.present { background: #c9b458; color: #fff; }
    .key.absent  { background: #787c7e; color: #fff; }

    .key.big { min-width: 70px; }
  </style>
</head>

"ZONES",	"ZOOMS",										
];

    const wordLength = 5;
      const maxRows = 6;

      let solution = "";
      let currentRow = 0;
      let currentGuess = "";

      const board = document.getElementById("board");
      const messageEl = document.getElementById("message");
      const keyboard = document.getElementById("keyboard");

      /* ---------------- BOARD ---------------- */

      function initBoard() {
        board.innerHTML = "";
        for (let r = 0; r < maxRows; r++) {
          const row = document.createElement("div");
          row.className = "row";
          for (let c = 0; c < wordLength; c++) {
            const tile = document.createElement("div");
            tile.className = "tile";
            tile.dataset.row = r;
            tile.dataset.col = c;
            row.appendChild(tile);
          }
          board.appendChild(row);
        }
      }

      function updateTiles() {
        for (let i = 0; i < wordLength; i++) {
          const tile = document.querySelector(`.tile[data-row="${currentRow}"][data-col="${i}"]`);
          tile.textContent = currentGuess[i] || "";
        }
      }

      /* ---------------- KEYBOARD ---------------- */

      function buildKeyboard() {
        keyboard.innerHTML = "";
        const rows = [
          "QWERTYUIOP".split(""),
          "ASDFGHJKL".split(""),
          ["ENT", ..."ZXCVBNM".split(""), "DEL"]
        ];

        rows.forEach(row => {
          const rowDiv = document.createElement("div");
          rowDiv.className = "key-row";
          row.forEach(key => {
            const keyDiv = document.createElement("div");
            keyDiv.className = "key";
            keyDiv.dataset.key = key;
            if (key === "ENT" || key === "DEL") keyDiv.classList.add("big");
            keyDiv.textContent = key;
            keyDiv.onclick = () => handleKeyPress(key);
            rowDiv.appendChild(keyDiv);
          });
          keyboard.appendChild(rowDiv);
        });
      }

      /* ---------------- MESSAGES ---------------- */

      function showMessage(msg, clickable = false) {
        messageEl.textContent = msg;
        if (clickable) {
          messageEl.style.cursor = "pointer";
          messageEl.onclick = () => newGame();
        } else {
          messageEl.style.cursor = "default";
          messageEl.onclick = null;
        }
      }

      /* ---------------- GUESS EVALUATION ---------------- */

      function evaluateGuess(guess, solution) {
        const result = Array(wordLength).fill("absent");
        const solArr = solution.split("");
        const used = Array(wordLength).fill(false);

        for (let i = 0; i < wordLength; i++) {
          if (guess[i] === solArr[i]) {
            result[i] = "correct";
            used[i] = true;
          }
        }

        for (let i = 0; i < wordLength; i++) {
          if (result[i] === "correct") continue;
          for (let j = 0; j < wordLength; j++) {
            if (!used[j] && guess[i] === solArr[j]) {
              result[i] = "present";
              used[j] = true;
              break;
            }
          }
        }

        return result;
      }

      function setRowTiles(rowIndex, guess, result) {
        for (let i = 0; i < wordLength; i++) {
          const tile = document.querySelector(`.tile[data-row="${rowIndex}"][data-col="${i}"]`);
          tile.classList.remove("correct", "present", "absent");
          tile.classList.add(result[i]);
        }
      }

      function updateKeyboard(guess, result) {
        for (let i = 0; i < guess.length; i++) {
          const letter = guess[i];
          const status = result[i];
          const keyEl = document.querySelector(`.key[data-key="${letter}"]`);
          if (!keyEl) continue;

          if (status === "correct") {
            keyEl.classList.remove("present", "absent");
            keyEl.classList.add("correct");
          } else if (status === "present" && !keyEl.classList.contains("correct")) {
            keyEl.classList.remove("absent");
            keyEl.classList.add("present");
          } else if (!keyEl.classList.contains("correct") &&
            !keyEl.classList.contains("present")) {
            keyEl.classList.add("absent");
          }
        }
      }

      /* ---------------- FIREWORKS ---------------- */

      const canvas = document.getElementById("fireworksCanvas");
      const ctx = canvas.getContext("2d");

      let fireworksActive = false;
      let particles = [];

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      window.addEventListener("resize", () => {
        // Prevent canvas wipe during fireworks
        if (!fireworksActive) resizeCanvas();
      });

      function createBurst() {
        const colors = ["#ff6b6b", "#ffd93d", "#6bcBff", "#ff9ff3", "#feca57", "#48dbfb", "#f368e0"];
        const x = canvas.width / 2 + (Math.random() * 200 - 100);
        const y = canvas.height / 3 + (Math.random() * 100 - 50);

        for (let i = 0; i < 25; i++) {
          particles.push({
            x,
            y,
            angle: Math.random() * Math.PI * 2,
            speed: Math.random() * 3 + 1,
            size: Math.random() * 3 + 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            life: 40
          });
        }
      }

      function animateFireworks() {
        ctx.globalAlpha = 1;              // Reset alpha every frame
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
          p.x += Math.cos(p.angle) * p.speed;
          p.y += Math.sin(p.angle) * p.speed;
          p.life--;

          ctx.globalAlpha = p.life / 40;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        });

        particles = particles.filter(p => p.life > 0);

        if (fireworksActive) {
          requestAnimationFrame(animateFireworks);
        }
      }

      function launchFireworks() {
        fireworksActive = true;
        resizeCanvas();        // Lock size BEFORE drawing
        particles = [];

        const interval = setInterval(() => {
          for (let i = 0; i < 12; i++) createBurst();
        }, 400);

        animateFireworks();

        setTimeout(() => {
          clearInterval(interval);
          fireworksActive = false;
        }, 5000);
      }


      /* ---------------- GAME LOGIC ---------------- */

      function endGame(message) {
        showMessage(message + " Tap here for a new game.", true);
      }

      function handleKeyPress(key) {
        if (key === "ENT") {
          if (currentGuess.length < wordLength) {
            showMessage("Not enough letters.");
            return;
          }

          const guess = currentGuess.trim().toUpperCase();
          const answer = solution.trim().toUpperCase();

          const result = evaluateGuess(guess, answer);
          setRowTiles(currentRow, guess, result);
          updateKeyboard(guess, result);

          if (guess === answer) {
            launchFireworks();
            endGame("Cathy you're the Best!");
            return;
          }

          currentRow++;
          currentGuess = "";

          if (currentRow >= maxRows) {
            endGame(`Out of tries! Word was ${solution}.`);
            return;
          }

          showMessage("Try again.");
          return;
        }

        if (key === "DEL") {
          currentGuess = currentGuess.slice(0, -1);
          updateTiles();
          return;
        }

        if (/^[A-Z]$/.test(key) && currentGuess.length < wordLength) {
          currentGuess += key;
          updateTiles();
        }
      }

      function newGame() {
        solution = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
        currentRow = 0;
        currentGuess = "";
        initBoard();
        buildKeyboard();
        resizeCanvas();
        showMessage("Tap letters to guess the word.");
      }

      window.onload = () => {
        requestAnimationFrame(() => {
          resizeCanvas();
          newGame();
        });
      };
    </script>
